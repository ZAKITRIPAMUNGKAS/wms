<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Nama Perusahaan System</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
                    colors: { brand: '#4f46e5' }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-900 font-sans min-h-screen flex items-center justify-center p-4 md:p-8 relative overflow-x-hidden">

    <!-- Background Blobs -->
    <div class="fixed inset-0 z-0 overflow-hidden pointer-events-none opacity-30">
        <div class="absolute -top-24 -left-24 w-96 h-96 bg-indigo-600 rounded-full blur-[120px]"></div>
        <div class="absolute -bottom-24 -right-24 w-96 h-96 bg-blue-600 rounded-full blur-[120px]"></div>
    </div>

    <!-- Login Card -->
    <div class="w-full max-w-[440px] bg-white/10 backdrop-blur-2xl border border-white/20 p-8 md:p-12 rounded-[2.5rem] shadow-2xl relative z-10 flex flex-col">
        
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-indigo-600 rounded-3xl mb-6 shadow-lg shadow-indigo-500/30 transform hover:rotate-6 transition-transform duration-300">
                <i class="ph-fill ph-package text-white text-4xl"></i>
            </div>
            <h2 class="text-3xl md:text-4xl font-black text-white tracking-tight">Nama Perusahaan</h2>
            <p class="text-slate-400 mt-3 text-sm md:text-base font-medium">Manajemen Gudang Terpadu</p>
        </div>

        <form action="dashboard.html" class="space-y-6">
            <div class="space-y-2">
                <label class="block text-sm font-bold text-slate-300 ml-1">Email / Username</label>
                <div class="relative group">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-indigo-400 transition-colors duration-300">
                        <i class="ph ph-envelope-simple text-xl md:text-2xl"></i>
                    </span>
                    <input type="text" placeholder="Masukkan email Anda" 
                        class="w-full bg-white/5 border border-white/10 text-white rounded-2xl pl-12 pr-4 py-4 md:py-5 outline-none focus:ring-2 focus:ring-indigo-500/50 focus:border-indigo-500 transition-all placeholder:text-slate-600 font-medium">
                </div>
            </div>

            <div class="space-y-2">
                <div class="flex justify-between items-center px-1">
                    <label class="text-sm font-bold text-slate-300">Password</label>
                    <a href="#" class="text-xs text-indigo-400 hover:text-indigo-300 font-bold transition-colors">Lupa Password?</a>
                </div>
                <div class="relative group">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-indigo-400 transition-colors duration-300">
                        <i class="ph ph-lock-simple text-xl md:text-2xl"></i>
                    </span>
                    <input type="password" placeholder="••••••••" 
                        class="w-full bg-white/5 border border-white/10 text-white rounded-2xl pl-12 pr-4 py-4 md:py-5 outline-none focus:ring-2 focus:ring-indigo-500/50 focus:border-indigo-500 transition-all placeholder:text-slate-600 font-black">
                </div>
            </div>

            <button type="submit" 
                class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-black py-4 md:py-5 rounded-2xl shadow-xl shadow-indigo-500/20 transition-all duration-300 transform active:scale-[0.98] group flex items-center justify-center gap-3 mt-8">
                Masuk Sekarang
                <i class="ph-bold ph-arrow-right text-lg transition-transform group-hover:translate-x-1"></i>
            </button>
        </form>

        <div class="mt-12 text-center">
            <p class="text-sm font-semibold text-slate-500">
                Belum punya akun? 
                <a href="#" class="text-indigo-400 hover:text-indigo-300 font-bold transition-colors ml-1">Hubungi Administrator</a>
            </p>
        </div>
    </div>

</body>
</html>
